name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run verify
        run: npm run verify

      - name: Run package/release tests
        run: npm run test:package
