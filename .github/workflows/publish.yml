name: Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag/version to rehearse (vX.Y.Z)
        required: true
        type: string
      ref:
        description: GitHub-visible branch, SHA, or ref to check out for the dry-run rehearsal
        required: false
        default: main
        type: string
      dry_run:
        description: Run npm publish in dry-run mode; manual runs cannot publish live
        required: false
        default: true
        type: boolean
      release_window_days:
        description: Gorilla evidence freshness window in days
        required: false
        default: "7"
        type: string

permissions:
  contents: read
  id-token: write

env:
  NODE_VERSION: 24
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  RELEASE_WINDOW_DAYS: ${{ github.event_name == 'workflow_dispatch' && inputs.release_window_days || '7' }}

jobs:
  default-ci:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 0

      - name: Validate manual release inputs
        run: |
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            exit 0
          fi

          requested="${{ inputs.tag }}"
          if ! printf '%s\n' "${requested}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Requested release tag must use vX.Y.Z format: ${requested}"
            exit 1
          fi

          if [ "${{ inputs.dry_run }}" != "true" ]; then
            echo "Manual workflow_dispatch runs only support dry_run=true. Push a vX.Y.Z tag for a live publish."
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run default CI gate
        run: npm run verify

      - name: Run package/release gate
        run: npm run test:package

  integration:
    runs-on: ubuntu-latest
    needs: default-ci
    timeout-minutes: 30
    env:
      LSPEC_INTEGRATION: "1"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 0

      - name: Validate manual release inputs
        run: |
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            exit 0
          fi

          requested="${{ inputs.tag }}"
          if ! printf '%s\n' "${requested}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Requested release tag must use vX.Y.Z format: ${requested}"
            exit 1
          fi

          if [ "${{ inputs.dry_run }}" != "true" ]; then
            echo "Manual workflow_dispatch runs only support dry_run=true. Push a vX.Y.Z tag for a live publish."
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install real provider CLIs
        run: npm install --global @anthropic-ai/claude-code @github/copilot @openai/codex

      - name: Authenticate Codex CLI
        run: |
          printf '%s' "$OPENAI_API_KEY" | codex login --with-api-key
          codex login status

      - name: Show provider versions
        run: |
          claude --version
          codex --version
          copilot --version

      - name: Run real-harness gate
        run: npm run test:integration

  gorilla-evidence:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 0

      - name: Validate manual release inputs
        run: |
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            exit 0
          fi

          requested="${{ inputs.tag }}"
          if ! printf '%s\n' "${requested}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Requested release tag must use vX.Y.Z format: ${requested}"
            exit 1
          fi

          if [ "${{ inputs.dry_run }}" != "true" ]; then
            echo "Manual workflow_dispatch runs only support dry_run=true. Push a vX.Y.Z tag for a live publish."
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify committed gorilla evidence
        run: npx tsx scripts/check-release-evidence.ts --reference-date "$(date -u +%F)" --release-window-days "${{ env.RELEASE_WINDOW_DAYS }}"

  publish:
    runs-on: ubuntu-latest
    needs:
      - default-ci
      - integration
      - gorilla-evidence
    if: ${{ success() }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 0

      - name: Validate manual release inputs
        run: |
          if [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            exit 0
          fi

          requested="${{ inputs.tag }}"
          if ! printf '%s\n' "${requested}" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Requested release tag must use vX.Y.Z format: ${requested}"
            exit 1
          fi

          if [ "${{ inputs.dry_run }}" != "true" ]; then
            echo "Manual workflow_dispatch runs only support dry_run=true. Push a vX.Y.Z tag for a live publish."
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Verify tag and release markers are in sync
        run: npx tsx scripts/check-release-version-sync.ts --tag "${{ env.RELEASE_TAG }}"

      - name: Publish package to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.dry_run }}" = "true" ]; then
            npm publish --access public --provenance --dry-run
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual workflow_dispatch runs only support dry_run=true. Push a vX.Y.Z tag for a live publish."
            exit 1
          else
            npm publish --access public --provenance
          fi
